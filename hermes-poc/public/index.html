<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>梧桐 Agent 工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand-row">
          <div class="brand-mark">W</div>
          <div>
            <div class="brand-title">梧桐 Agent</div>
            <div class="brand-subtitle">Hermes POC</div>
          </div>
        </div>

        <div class="user-card">
          <label for="userSelect">当前用户</label>
          <select id="userSelect"></select>
          <div id="userMeta" class="user-meta"></div>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" data-module="workbench">工作台</button>
          <button class="nav-item" data-module="invoice">发票管理</button>
          <button class="nav-item" data-module="shipment">货件管理</button>
          <button class="nav-item" data-module="files">文件中心</button>
          <button class="nav-item" data-module="tasks">任务中心</button>
          <button class="nav-item" data-module="audit">审计日志</button>
        </nav>

        <div class="runtime-card">
          <div class="section-label">Runtime</div>
          <div id="runtimeMode" class="runtime-mode">加载中</div>
          <button id="themeToggle" class="secondary-btn" type="button">深色模式</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <h1>企业智能工作台</h1>
            <p id="activeModuleLabel">发票闭环任务</p>
          </div>
          <div class="header-actions">
            <button id="refreshBtn" class="secondary-btn" type="button">刷新</button>
          </div>
        </header>

        <section class="chat-panel" aria-label="Agent 执行区">
          <div id="taskTimeline" class="timeline"></div>
          <form id="messageForm" class="composer">
            <textarea
              id="messageInput"
              rows="3"
              placeholder="生成美国店铺 1 张金额 1280 的发票并上传"
            ></textarea>
            <button type="submit" class="primary-btn">发送</button>
          </form>
        </section>
      </main>

      <aside class="inspector" aria-label="业务面板">
        <section class="panel-section">
          <div class="section-heading">
            <h2>数据看板</h2>
            <span id="auditHealth" class="status-pill">审计校验</span>
          </div>
          <div id="metricsGrid" class="metrics-grid"></div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>任务</h2>
          </div>
          <div id="taskList" class="compact-list"></div>
        </section>

        <section class="panel-section">
          <div class="section-heading">
            <h2>文件</h2>
          </div>
          <div id="fileList" class="compact-list"></div>
        </section>

        <section class="panel-section audit-section">
          <div class="section-heading">
            <h2>审计</h2>
          </div>
          <div id="auditList" class="audit-list"></div>
        </section>
      </aside>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
