# ─────────────────────────────────────────────────────────────────────────────
# Kortix/Suna — Nginx LAN Reverse Proxy
# ─────────────────────────────────────────────────────────────────────────────
#
# Exposes all local services to the LAN via a single nginx instance.
# All backends stay on 127.0.0.1; nginx is the only thing on 0.0.0.0.
#
# Usage:
#   LAN_IP=192.168.1.100 envsubst '$LAN_IP' < nginx-lan.conf > /tmp/nginx-lan.conf
#   nginx -c /tmp/nginx-lan.conf
#
# Or use the companion start-nginx.sh script which does this automatically.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
pid /tmp/nginx-lan.pid;
error_log /tmp/nginx-lan-error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/nginx-lan-access.log;

    # ── Shared proxy defaults ────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # ── Upstream definitions ─────────────────────────────────────────────
    upstream web       { server 127.0.0.1:3000; }
    upstream api       { server 127.0.0.1:8008; }
    upstream sb_master { server 127.0.0.1:14000; }
    upstream sb_novnc  { server 127.0.0.1:14002; }
    upstream sb_vncs   { server 127.0.0.1:14003; }
    upstream sb_pres   { server 127.0.0.1:14004; }
    upstream sb_brws   { server 127.0.0.1:14005; }
    upstream sb_brwv   { server 127.0.0.1:14006; }
    upstream sb_static { server 127.0.0.1:14008; }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =====================================================================
    # 1. Main — Web + API (port 80)
    # =====================================================================
    server {
        listen 80;
        server_name ${LAN_IP} localhost;
        # API routes — WebSocket support for sandbox proxy + tunnel
        location /v1/ {
            proxy_pass http://api;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Everything else → Next.js frontend
        location / {
            proxy_pass http://web;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # =====================================================================
    # 2. Supabase — already binds 0.0.0.0:54321 natively, no proxy needed
    # =====================================================================

    # =====================================================================
    # 3. Sandbox ports (14000–14008)
    # =====================================================================
    # Kortix Master (proxy entry point)
    server {
        listen 14000;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_master;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Desktop noVNC
    server {
        listen 14002;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_novnc;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Desktop HTTPS
    server {
        listen 14003;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_vncs;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Presentation Viewer
    server {
        listen 14004;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_pres;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Agent Browser Stream (WebSocket)
    server {
        listen 14005;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_brws;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Agent Browser Viewer
    server {
        listen 14006;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_brwv;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # Static Web Server
    server {
        listen 14008;
        server_name ${LAN_IP} localhost;
        location / {
            proxy_pass http://sb_static;
        }
    }
}

# =====================================================================
# 4. SSH (TCP stream, port 24007 → sandbox 14007)
# =====================================================================
# SSH is raw TCP, not HTTP — uses nginx stream module.
# Mapped to 24007 externally to avoid port conflict with sandbox's
# 127.0.0.1:14007 binding. LAN clients connect via: ssh -p 24007 <LAN_IP>
stream {
    server {
        listen 24007;
        proxy_pass 127.0.0.1:14007;
    }
}
